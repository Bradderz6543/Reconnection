  <rect width="64" height="64" rx="11" ry="11" fill="url(#bg)"/>
  <rect x="6" y="6" width="52" height="52" rx="8" ry="8" fill="none" stroke="rgba(216,167,58,0.18)" stroke-width="1"/>
  <text x="32" y="44" text-anchor="middle"
