      <stop offset="0" stop-color="#16321f"/>
      <stop offset="1" stop-color="#0c100c"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecc25a"/>
